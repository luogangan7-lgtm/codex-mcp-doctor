name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run test suite
        run: |
          python3 tests/test_doctor.py
      - name: Run doctor on examples
        run: |
          python3 scripts/doctor.py --config examples/broken-stdio/config.toml --json || true
          python3 scripts/doctor.py --config examples/broken-http/config.toml --json || true
