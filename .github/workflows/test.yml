name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run test suite
        run: |
          python3 tests/test_doctor.py
      - name: Verify zero external dependencies (AST scan)
        run: |
          # Fail CI if doctor.py imports any non-stdlib module.
          # This is the CI gate for the zero-dependency claim.
          python3 scripts/verify-zero-deps.py
      - name: Validate plugin manifest
        run: |
          # Fail CI if .codex-plugin/plugin.json is not a valid Codex plugin
          # manifest (missing keys, bad version, invalid JSON). The validator
          # enforces the real Codex spec (name/version/description); the
          # official notion/github/latex/sites plugins have no `id` field.
          python3 scripts/validate-plugin.py
      - name: Run doctor on examples
        run: |
          # broken-stdio and broken-http are expected to report errors (exit 1)
          # but must not crash. security-issues is --skip-probe (exit 0).
          python3 scripts/doctor.py --config examples/broken-stdio/config.toml --json || [ $? -eq 1 ]
          python3 scripts/doctor.py --config examples/broken-http/config.toml --json || [ $? -eq 1 ]
          python3 scripts/doctor.py --config examples/security-issues/config.toml --check secrets --skip-probe --json
          python3 scripts/doctor.py --config examples/homoglyph-attack/config.toml --json
      - name: Run end-to-end demo script
        run: |
          # Smoke-test the guided demo (scripts/demo.sh). Exercises every
          # example + the save/check baseline flow end to end. --no-pause
          # keeps it non-interactive; non-zero exits from broken-server
          # scenes are absorbed by the script so the whole run exits 0.
          bash scripts/demo.sh --no-pause
