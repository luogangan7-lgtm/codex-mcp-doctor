# Example: broken HTTP/SSE MCP server configs
# These demonstrate common real-world failure modes

# 1. Wrong port — connection refused (server not listening there)
[mcp_servers.wrong-port]
url = "http://localhost:99/mcp"

# 2. HTTPS to a non-HTTPS endpoint — SSL error
[mcp.services.ssl-mismatch]
url = "https://localhost:8080/mcp"

