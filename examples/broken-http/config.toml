# Example: broken HTTP/SSE MCP server configs
# These demonstrate common real-world failure modes.
#
# Uses 127.0.0.1 (not localhost) to avoid interference from HTTP proxies
# that may intercept localhost traffic. Port 1 is guaranteed to refuse
# connections on any OS (requires root to bind).

# 1. Wrong port - connection refused (no server listening)
[mcp_servers.wrong-port]
url = "http://127.0.0.1:1/mcp"

# 2. HTTPS to a dead port - connection refused before TLS handshake.
#    Note: a true ssl_error (cert mismatch / self-signed) requires a live
#    server with a bad cert. Doctor reports ssl_error when the TCP connection
#    succeeds but the TLS handshake fails. To demo that locally, run any HTTP
#    server on HTTPS and point doctor at it.
[mcp_servers.https-dead-port]
url = "https://127.0.0.1:1/mcp"

# 3. API endpoint without auth header - flagged by config-layer check
[mcp_servers.api-no-auth]
url = "https://api.openai.com/v1/something"
